spring.application.name=fitness-log-api

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/fitnesslog}
spring.data.mongodb.auto-index-creation=true

app.jwt.secret=${JWT_SECRET:FitnessLogApiSecretKey2026ForHMACSHA256MustBe256Bits}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

spring.jackson.serialization.write-dates-as-timestamps=false
